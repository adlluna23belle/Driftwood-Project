<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Driftwood Furniture Shop</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="bg-dark text-white py-3">
    <div class="container">

        <div class="d-flex justify-content-between align-items-center">

            <div>
                <h3 class="mb-0">DRIFTWOOD FURNITURE SHOP</h3>
                <small>Furniture Details</small>
            </div>

            <div>
                <a href="index.html" class="btn btn-outline-light btn-sm me-2">
                    Home
                </a>

                <a href="#" class="btn btn-outline-light btn-sm me-2">
                    My Cart
                </a>

                <button id="logoutBtn" class="btn btn-danger btn-sm">
                    Logout
                </button>
            </div>

        </div>

    </div>
</header>

    <div class="container mt-5">

        <div id="productContainer">

            <div class="text-center">
                <div class="spinner-border text-secondary"></div>
                <p class="mt-3">Loading Product...</p>
            </div>

        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        const token = localStorage.getItem('token');

        $(document).on('click', '#logoutBtn', function() {

             localStorage.removeItem('token');
             localStorage.removeItem('role');

             window.location.href = 'login.html';

        });

        if(!token){
            window.location.href = 'login.html';
        }

        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');

        if (!productId) {

            $('#productContainer').html(`
                <div class="alert alert-danger">
                    Product ID not found.
                </div>
            `);

        } else {

            $.ajax({

                url: '/api/products/' + productId,
                type: 'GET',

                success: function(product) {

                    let imageSrc = 'https://via.placeholder.com/600x400';

                    try {

                        const images = JSON.parse(product.image);

                        if(images.length > 0){
                            imageSrc = images[0];
                        }

                    } catch(e){

                        if(product.image){
                            imageSrc = product.image;
                        }

                    }

                    $('#productContainer').html(`

                        <div class="row">

                            <div class="col-md-6">

                                <img
                                    src="${imageSrc}"
                                    alt="${product.name}"
                                    class="img-fluid rounded shadow"
                                >

                            </div>

                            <div class="col-md-6">

                                <h2 class="mb-3">
                                    ${product.name}
                                </h2>

                                <h3 class="text-success mb-4">
                                    ₱${parseFloat(product.price).toFixed(2)}
                                </h3>

                                <h5>Description</h5>

                                <p>
                                    ${product.description || 'No description available.'}
                                </p>

                                <hr>

                                <button
                                    class="btn btn-wood btn-lg"
                                    id="addToCartBtn"
                                    data-product-id="${product.id}">
                                    Add to Cart
                                </button>   

                            </div>

                        </div>

                    `);

                },

                error: function() {

                    $('#productContainer').html(`
                        <div class="alert alert-danger">
                            Product not found.
                        </div>
                    `);

                }

            });

        }

        $(document).on('click', '#addToCartBtn', function() {

        const productId = $(this).data('product-id');

        const userId = localStorage.getItem('userId');

        $.ajax({

            url: '/api/cart/add',
            type: 'POST',
            contentType: 'application/json',

            data: JSON.stringify({
                
                userId: userId,
                productId: productId

            }),

            success: function(response) {

                alert(response.message);

            },

            error: function(err) {

                alert('Failed to add product.');

                console.log(err);

            }

        });

    });

    </script>

</body>
</html>
