<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Cart | Driftwood Furniture</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="bg-dark text-white py-3">

<div class="container d-flex justify-content-between">

<h3>My Shopping Cart</h3>

<div>

<a href="index.html"
class="btn btn-outline-light btn-sm">
Continue Shopping
</a>

</div>

</div>

</header>

<div class="container mt-5">

<h2 class="mb-4">
Items in Cart
</h2>

<div id="cartContainer"></div>

<div class="mt-4 text-end">

    <h3>
        Total:
        <span id="grandTotal">
            ₱0.00
        </span>
    </h3>

    <a
        href="checkout.html"
        class="btn btn-success btn-lg mt-3">
        Proceed to Checkout
    </a>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

const token = localStorage.getItem('token');

if(!token){
    window.location.href='login.html';
}

const userId = localStorage.getItem('userId');

loadCart();

function loadCart(){

    $.ajax({

        url:'/api/cart/' + userId,
        type:'GET',

        success:function(items){

            let html='';
            let total=0;

            if(items.length===0){

                html=`
                <div class="alert alert-info">
                    Your cart is empty.
                </div>
                `;

                $('#cartContainer').html(html);

                return;
            }

            items.forEach(item=>{

                let imageSrc='https://via.placeholder.com/100';

                try{

                    let imgs=JSON.parse(item.Product.image);

                    if(imgs.length>0){
                        imageSrc=imgs[0];
                    }

                }catch(e){

                    imageSrc=item.Product.image;

                }

                let subtotal=
                    parseFloat(item.Product.price)
                    * item.quantity;

                total+=subtotal;

                html+=`

                <div class="card mb-3">

                    <div class="card-body">

                        <div class="row align-items-center">

                            <div class="col-md-2">

                                <img
                                src="${imageSrc}"
                                class="img-fluid rounded">

                            </div>

                            <div class="col-md-4">

                                <h5>
                                    ${item.Product.name}
                                </h5>

                            </div>

                            <div class="col-md-2">

                                <input
                                    type="number"
                                    min="1"
                                    value="${item.quantity}"
                                    class="form-control quantityInput"
                                    data-id="${item.id}">

                            </div>

                            <div class="col-md-2">

                                ₱${subtotal.toFixed(2)}

                            </div>

                            <div class="col-md-2">

                                <button
                                class="btn btn-danger btn-sm removeBtn"
                                data-id="${item.id}">
                                    Remove
                                </button>

                            </div>

                        </div>

                    </div>

                </div>

                `;
            });

            $('#cartContainer').html(html);

            $('#grandTotal').text(
                '₱'+total.toFixed(2)
            );

        }

    });

}

$(document).on('click','.removeBtn',function(){

    const id=$(this).data('id');

    if(!confirm('Remove item?')){
        return;
    }

    $.ajax({

        url:'/api/cart/'+id,
        type:'DELETE',

        success:function(){

            loadCart();

        }

    });

});

$(document).on('change', '.quantityInput', function(){

    const id = $(this).data('id');

    const quantity = $(this).val();

    $.ajax({

        url: '/api/cart/' + id,

        type: 'PUT',

        contentType: 'application/json',

        data: JSON.stringify({

            quantity: quantity

        }),

        success: function(){

            loadCart();

        }

    });

});
</script>

</body>
</html>
