<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Orders | Driftwood Furniture</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="style.css">

</head>
<body>

<header class="bg-dark text-white py-3">

<div class="container d-flex justify-content-between">

<h3>My Orders</h3>

<a href="index.html"
class="btn btn-outline-light btn-sm">
Back to Shop
</a>

</div>

</header>

<div class="container mt-5">

<h2 class="mb-4">
Order History
</h2>

<div id="ordersContainer">

<div class="text-center">

<div class="spinner-border"></div>

<p class="mt-3">
Loading Orders...
</p>

</div>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

const token =
localStorage.getItem('token');

if(!token){

    window.location.href =
        'login.html';

}

const userId =
localStorage.getItem('userId');

loadOrders();

function loadOrders(){

    $.ajax({

        url:
        '/api/transactions/customer/'
        + userId,

        type:'GET',

        success:function(orders){

            let html='';

            if(orders.length===0){

                html=`
                <div class="alert alert-info">
                    No orders found.
                </div>
                `;

                $('#ordersContainer')
                .html(html);

                return;

            }

            orders.forEach(order=>{

                let badge='secondary';

                if(order.status==='Pending')
                    badge='warning';

                if(order.status==='Processing')
                    badge='primary';

                if(order.status==='Delivered')
                    badge='success';

                if(order.status==='Cancelled')
                    badge='danger';

                html+=`

                <div class="card mb-3">

                    <div class="card-body">

                        <div class="row">

                            <div class="col-md-3">

                                <strong>
                                Order ID
                                </strong>

                                <br>

                                #${order.id}

                            </div>

                            <div class="col-md-3">

                                <strong>
                                Total
                                </strong>

                                <br>

                                ₱${parseFloat(
                                    order.totalAmount
                                ).toFixed(2)}

                            </div>

                            <div class="col-md-3">

                                <strong>
                                Date
                                </strong>

                                <br>

                                ${
                                    new Date(
                                        order.createdAt
                                    )
                                    .toLocaleDateString()
                                }

                            </div>

                            <div class="col-md-3">

                                <span
                                class="badge bg-${badge}">
                                    ${order.status}
                                </span>

                            </div>

                        </div>

                    </div>

                </div>

                `;

            });

            $('#ordersContainer')
            .html(html);

        }

    });

}

</script>

</body>
</html>
