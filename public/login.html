<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driftwood Furniture - Login / Register</title>
    <link class="jsbin" href="http://ajax.googleapis.com/ajax/libs/jqueryui/1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: #F5F5DC;">

    <div class="card p-4 shadow my-5" style="width: 450px; border: 1px solid #D2B48C;">
        <h3 class="text-center text-brown mb-4" id="formTitle">Login to Driftwood</h3>
        
        <form id="authForm">
            <div id="registerFields" class="d-none">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" id="firstName" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Surname</label>
                        <input type="text" id="surname" class="form-control">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <div id="confirmPasswordFields" class="mb-3 d-none">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control">
            </div>

            <button type="submit" class="btn btn-wood w-100" id="submitBtn">Login</button>
        </form>

        <div class="text-center mt-3">
            <a href="#" id="toggleLink" style="color: #8B4513;">Don't have an account? Register here</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            var isLogin = true;

            // Toggle interface sa pagitan ng Login at Register
            $('#toggleLink').click(function(e) {
                e.preventDefault();
                isLogin = !isLogin;
                $('#authForm')[0].reset(); // I-reset ang mga isinulat na inputs

                if(isLogin) {
                    $('#formTitle').text('Login to Driftwood');
                    $('#submitBtn').text('Login');
                    $('#toggleLink').text("Don't have an account? Register here");
                    $('#registerFields, #confirmPasswordFields').addClass('d-none');
                    $('#firstName, #surname, #email, #confirmPassword').attr('required', false);
                } else {
                    $('#formTitle').text('Create Account');
                    $('#submitBtn').text('Register');
                    $('#toggleLink').text('Already have an account? Login here');
                    $('#registerFields, #confirmPasswordFields').removeClass('d-none');
                    $('#firstName, #surname, #email, #confirmPassword').attr('required', true);
                }
            });

            // Form Submit handler gamit ang JQuery AJAX
            $('#authForm').submit(function(e) {
                e.preventDefault();
                
                var password = $('#password').val();
                var endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';

                // Patunayan kung magkatugma ang password kapag nagpaparehistro
                if (!isLogin) {
                    var confirmPassword = $('#confirmPassword').val();
                    if (password !== confirmPassword) {
                        alert("Error: Hindi nagtutugma ang Password at Confirm Password mo.");
                        return;
                    }
                }

                // Pag-ipon ng data payload
                var dataPayload = {
                    username: $('#username').val(),
                    password: password
                };

                if (!isLogin) {
                    dataPayload.firstName = $('#firstName').val();
                    dataPayload.surname = $('#surname').val();
                    dataPayload.email = $('#email').val();
                }

                // AJAX Request (MP6 Requirement)
                $.ajax({
                    url: endpoint,
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(dataPayload),
                    success: function(response) {
                        if(isLogin) {
                            alert('Login Successful!');
                            // I-save ang token at role sa LocalStorage para magamit sa mga susunod na request
                            localStorage.setItem('token', response.token);
                            localStorage.setItem('role', response.user.role);
                            localStorage.setItem('userId', response.user.id);
                            
                            // Redirect base sa role ng gumagamit
                            if(response.user.role === 'admin') {
                                window.location.href = 'admin.html';
                            } else {
                                window.location.href = 'index.html';
                            }
                        } else {
                            alert('Registration successful! You can now login.');
                            $('#toggleLink').click(); // Awtomatikong ibalik sa login form
                        }
                    },
                    error: function(err) {
                        alert('Error: ' + err.responseJSON.message);
                    }
                });
            });
        });
    </script>
</body>
</html>
