<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driftwood Furniture - Login / Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/jquery.validation/1.19.3/jquery.validate.min.js"></script>
    <style>
        .error { color: red; font-size: 0.8rem; }
        .btn-wood { background-color: #8B4513; color: white; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: #F5F5DC;">

    <div class="card p-4 shadow my-5" style="width: 450px; border: 1px solid #D2B48C;">
        <h3 class="text-center text-brown mb-4" id="formTitle">Login to Driftwood</h3>
        
        <form id="authForm">
            <div id="registerFields" class="d-none">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" name="firstName" id="firstName" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Surname</label>
                        <input type="text" name="surname" id="surname" class="form-control">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" id="email" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" required>
            </div>

            <div id="confirmPasswordFields" class="mb-3 d-none">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirmPassword" id="confirmPassword" class="form-control">
            </div>

            <button type="submit" class="btn btn-wood w-100" id="submitBtn">Login</button>
        </form>

        <div class="text-center mt-3">
            <a href="#" id="toggleLink" style="color: #8B4513;">Don't have an account? Register here</a>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            var isLogin = true;

            // Validator setup
            $("#authForm").validate({
                rules: {
                    username: { required: true, minlength: 4 },
                    password: { required: true, minlength: 6 },
                    email: { required: true, email: true },
                    confirmPassword: { equalTo: "#password" }
                },
                messages: {
                    confirmPassword: "Passwords do not match!"
                },
                submitHandler: function(form) {
                    performAuth();
                }
            });

            $('#toggleLink').click(function(e) {
                e.preventDefault();
                isLogin = !isLogin;
                $('#authForm')[0].reset();
                $("#authForm").validate().resetForm(); // Reset validation errors

                if(isLogin) {
                    $('#formTitle').text('Login to Driftwood');
                    $('#submitBtn').text('Login');
                    $('#toggleLink').text("Don't have an account? Register here");
                    $('#registerFields, #confirmPasswordFields').addClass('d-none');
                } else {
                    $('#formTitle').text('Create Account');
                    $('#submitBtn').text('Register');
                    $('#toggleLink').text('Already have an account? Login here');
                    $('#registerFields, #confirmPasswordFields').removeClass('d-none');
                }
            });

            function performAuth() {
                var endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
                var dataPayload = {
                    username: $('#username').val(),
                    password: $('#password').val()
                };

                if (!isLogin) {
                    dataPayload.firstName = $('#firstName').val();
                    dataPayload.surname = $('#surname').val();
                    dataPayload.email = $('#email').val();
                }

                $.ajax({
                    url: endpoint,
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(dataPayload),
                    success: function(response) {
                        if(isLogin) {
                            localStorage.setItem('token', response.token);
                            localStorage.setItem('role', response.user.role);
                            localStorage.setItem('userId', response.user.id);
                            window.location.href = response.user.role === 'admin' ? 'admin.html' : 'index.html';
                        } else {
                            alert('Registration successful!');
                            $('#toggleLink').click();
                        }
                    },
                    error: function(err) {
                        alert('Error: ' + (err.responseJSON?.message || "Something went wrong"));
                    }
                });
            }
        });
    </script>
</body>
</html>
