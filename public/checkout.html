<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Driftwood Furniture</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="bg-dark text-white py-3">

<div class="container d-flex justify-content-between">

<h3>Checkout</h3>

<a href="cart.html"
class="btn btn-outline-light btn-sm">
Back To Cart
</a>

</div>

</header>

<div class="container mt-5">

<div class="row">

<div class="col-md-8">

<div class="card">

<div class="card-body">

<h4 class="mb-3">
Shipping Information
</h4>

<div class="mb-3">

<label class="form-label">
Full Name
</label>

<input
type="text"
id="customerName"
class="form-control">

</div>

<div class="mb-3">

<label class="form-label">
Address
</label>

<textarea
id="address"
class="form-control">
</textarea>

</div>

<div class="mb-3">

<label class="form-label">
Contact Number
</label>

<input
type="text"
id="contactNumber"
class="form-control">

</div>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card">

<div class="card-body">

<h4>
Order Summary
</h4>

<hr>

<div id="summaryContainer">
Loading...
</div>

<h3 class="mt-3">
Total:
<span id="checkoutTotal">
₱0.00
</span>
</h3>

<button
id="placeOrderBtn"
class="btn btn-success w-100 mt-3">
Place Order
</button>

</div>

</div>

</div>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

const token = localStorage.getItem('token');

if(!token){
    window.location.href='login.html';
}

const userId =
localStorage.getItem('userId');

let grandTotal = 0;

loadSummary();

$('#placeOrderBtn').click(function(){

    const customerName =
        $('#customerName').val().trim();

    const address =
        $('#address').val().trim();

    const contactNumber =
        $('#contactNumber').val().trim();

    if(
        customerName === '' ||
        address === '' ||
        contactNumber === ''
    ){
        alert('Please complete all fields.');
        return;
    }

    $.ajax({

        url:'/api/cart/' + userId,
        type:'GET',

        success:function(cartItems){

            if(cartItems.length === 0){
                alert('Cart is empty.');
                return;
            }

            const items = cartItems.map(item => ({

                productId: item.productId,
                productName: item.Product.name,
                price: item.Product.price,
                quantity: item.quantity

            }));

            const payload = {

                customerId: userId,
                customerName: customerName,

                // temporary muna
                customerEmail:
                    contactNumber,

                totalAmount:
                    grandTotal,

                items: items

            };

            $.ajax({

                url:'/api/transactions',
                type:'POST',

                contentType:'application/json',

                data: JSON.stringify(payload),

                success:function(){

                    alert(
                        'Order placed successfully!'
                    );

                    window.location.href =
                        'orders.html';

                },

                error:function(err){

                    alert(
                        'Error creating transaction.'
                    );

                    console.log(err);

                }

            });

        }

    });

});

function loadSummary(){

    $.ajax({

        url:'/api/cart/' + userId,

        type:'GET',

        success:function(items){

            let html='';

            grandTotal = 0;

            items.forEach(item=>{

                const subtotal =
                    parseFloat(item.Product.price)
                    * item.quantity;

                grandTotal += subtotal;

                html += `
                    <div class="mb-2">
                        ${item.Product.name}
                        x ${item.quantity}
                        <br>
                        ₱${subtotal.toFixed(2)}
                    </div>
                `;
            });

            $('#summaryContainer').html(html);

            $('#checkoutTotal').text(
                '₱'+grandTotal.toFixed(2)
            );

        }

    });

}

</script>

</body>
</html>
